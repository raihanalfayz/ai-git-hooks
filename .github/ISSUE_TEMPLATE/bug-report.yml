name: Bug Report
description: Report a bug or unexpected behavior in AI Git Hooks
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us investigate.

  - type: dropdown
    id: hook
    attributes:
      label: Which hook is affected?
      description: Select the hook where the issue occurs.
      options:
        - pre-commit (AI Code Review)
        - prepare-commit-msg (Auto Message)
        - commit-msg (Validate)
        - pre-push (Security Scan)
        - install.sh
        - uninstall.sh
        - Configuration loading
        - Other
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: AI Provider
      description: Which AI provider are you using?
      options:
        - Claude (Anthropic)
        - OpenAI
        - Ollama (local)
        - None / not applicable
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Instead, what happened was...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Configure .ai-hooks.yml with...
        2. Stage some files with `git add`
        3. Run `git commit`
        4. See error...
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Paste your `.ai-hooks.yml` (redact any API keys).
      render: yaml
      placeholder: |
        provider: claude
        model: claude-sonnet-4-5-20250514
        hooks:
          pre-commit:
            enabled: true
    validations:
      required: false

  - type: textarea
    id: terminal-output
    attributes:
      label: Terminal Output
      description: Paste any relevant terminal output or error messages.
      render: shell
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g., macOS 14.2, Ubuntu 22.04, Windows 11
      placeholder: macOS 14.2
    validations:
      required: true

  - type: input
    id: bash-version
    attributes:
      label: Bash Version
      description: Output of `bash --version` (first line).
      placeholder: GNU bash, version 5.2.15
    validations:
      required: true

  - type: input
    id: git-version
    attributes:
      label: Git Version
      description: Output of `git --version`.
      placeholder: git version 2.42.0
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might be helpful.
    validations:
      required: false
